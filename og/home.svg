<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3d245a"/>
      <stop offset="100%" stop-color="#15091f"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- raspršene zvijezde -->
  <g fill="#e4e0f4">
    <circle cx="110" cy="90"  r="2.2"/>
    <circle cx="250" cy="160" r="1.5"/>
    <circle cx="180" cy="240" r="2.0"/>
    <circle cx="90"  cy="380" r="1.6"/>
    <circle cx="210" cy="470" r="2.3"/>
    <circle cx="330" cy="540" r="1.5"/>
    <circle cx="950" cy="110" r="2.4"/>
    <circle cx="1080" cy="200" r="1.7"/>
    <circle cx="1020" cy="320" r="2.0"/>
    <circle cx="1130" cy="430" r="1.6"/>
    <circle cx="930"  cy="490" r="2.2"/>
    <circle cx="820"  cy="560" r="1.5"/>
    <circle cx="600"  cy="70"  r="1.6"/>
    <circle cx="500"  cy="540" r="1.7"/>
    <circle cx="720"  cy="50"  r="1.4"/>
  </g>

  <!-- istaknute "sjajne" zvijezde -->
  <g fill="#c9bcd9" filter="url(#glow)">
    <circle cx="160" cy="120" r="3.5"/>
    <circle cx="1060" cy="160" r="3.5"/>
    <circle cx="260" cy="500" r="3.0"/>
  </g>

  <!-- brand -->
  <text x="600" y="295" text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic" font-weight="500"
        font-size="118" fill="#f4f0fa">Alkemijana</text>

  <!-- ornament -->
  <text x="600" y="365" text-anchor="middle"
        font-family="Georgia, serif" font-size="32"
        fill="#a78bd9" letter-spacing="14">✦ · ✦ · ✦</text>

  <!-- citat -->
  <text x="600" y="450" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif" font-style="italic"
        font-size="30" fill="#d8cce8">"Već znate. Karte samo pokazuju put."</text>

  <!-- footer -->
  <text x="600" y="555" text-anchor="middle"
        font-family="Georgia, serif" font-size="20"
        fill="#a78bd9" letter-spacing="8">BLOG · TAROT · ASTROLOGIJA</text>
</svg>
