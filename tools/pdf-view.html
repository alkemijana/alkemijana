<!doctype html>
<html><head><meta charset="utf-8"><title>PDF view</title>
<style>body{margin:0;background:#888}canvas{display:block;margin:8px auto;box-shadow:0 0 8px #0008}</style>
</head><body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const file = new URLSearchParams(location.search).get('f') || '_upload.bin';
const pageNo = +(new URLSearchParams(location.search).get('p') || 0);
window.ready = false;
pdfjsLib.getDocument(file + '?t=' + Date.now()).promise.then(async pdf => {
  const pages = pageNo ? [pageNo] : Array.from({length: pdf.numPages}, (_, i) => i + 1);
  for (const n of pages) {
    const page = await pdf.getPage(n);
    const vp = page.getViewport({ scale: +(new URLSearchParams(location.search).get('s') || 1.6) });
    const c = document.createElement('canvas');
    c.width = vp.width; c.height = vp.height;
    document.body.appendChild(c);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  }
  window.ready = true;
});
</script>
</body></html>
